name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Package and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CurseForge configuration
        env:
          CF_PROJECT_ID: ${{ vars.CF_PROJECT_ID }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          test -n "$CF_PROJECT_ID" || { echo "CF_PROJECT_ID repository variable is missing."; exit 1; }
          test -n "$CF_API_KEY" || { echo "CF_API_KEY repository secret is missing."; exit 1; }

      - name: Package and upload to CurseForge
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        with:
          args: -p ${{ vars.CF_PROJECT_ID }}

      - name: Upload packaged addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoWRoguelite
          path: .release/*.zip
          if-no-files-found: error

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .release/*.zip
          body_path: CHANGELOG.md
